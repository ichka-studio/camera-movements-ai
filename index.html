<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouvements de Caméra — IA Vidéo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --border: #1e2535;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e8eaf0;
    --muted: #5a6480;
    --card: #111520;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 60px 40px 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .logo-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .platform-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .badge-kling { color: #00e5ff; border-color: rgba(0,229,255,0.4); background: rgba(0,229,255,0.06); }
  .badge-veo { color: #4ade80; border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.06); }
  .badge-sora { color: #f59e0b; border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.06); }
  .badge-runway { color: #c084fc; border-color: rgba(192,132,252,0.4); background: rgba(192,132,252,0.06); }
  .badge-hailuo { color: #fb7185; border-color: rgba(251,113,133,0.4); background: rgba(251,113,133,0.06); }

  h1 {
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  /* Filters */
  .filters {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 10px;
    padding: 28px 40px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    justify-content: center;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  /* Grid */
  .grid {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    padding: 0;
  }

  .card {
    background: var(--card);
    padding: 28px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover { background: #141824; }
  .card:hover::before { opacity: 1; }

  .card[data-cat="dolly"] .card-icon { color: #00e5ff; }
  .card[data-cat="dolly"]::before { background: #00e5ff; }
  .card[data-cat="pan"] .card-icon { color: #4ade80; }
  .card[data-cat="pan"]::before { background: #4ade80; }
  .card[data-cat="tilt"] .card-icon { color: #f59e0b; }
  .card[data-cat="tilt"]::before { background: #f59e0b; }
  .card[data-cat="orbit"] .card-icon { color: #c084fc; }
  .card[data-cat="orbit"]::before { background: #c084fc; }
  .card[data-cat="zoom"] .card-icon { color: #fb7185; }
  .card[data-cat="zoom"]::before { background: #fb7185; }
  .card[data-cat="special"] .card-icon { color: #fbbf24; }
  .card[data-cat="special"]::before { background: #fbbf24; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }

  .card-left { display: flex; align-items: center; gap: 14px; }

  .card-icon {
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .card-en {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--border);
    font-weight: 500;
    flex-shrink: 0;
  }

  .card-desc {
    font-size: 13px;
    color: #8090b0;
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .prompt-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    position: relative;
  }

  .prompt-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .prompt-label::before {
    content: '›';
    color: var(--accent);
    font-size: 12px;
  }

  .prompt-text {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: #b8c8e8;
    line-height: 1.6;
    font-weight: 400;
  }

  .prompt-text .keyword {
    color: var(--accent);
    font-weight: 500;
  }

  .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.06);
    letter-spacing: 0.06em;
  }

  /* Hidden cards */
  .card.hidden { display: none; }

  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .count-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 16px 40px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .count-num {
    color: var(--accent);
    font-weight: 500;
  }

  @media (max-width: 600px) {
    header { padding: 40px 20px 30px; }
    .filters { padding: 20px; }
    .grid { grid-template-columns: 1fr; }
    .card { padding: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <span class="platform-badge badge-kling">Kling 3.0</span>
    <span class="platform-badge badge-veo">Veo 3</span>
    <span class="platform-badge badge-sora">Sora</span>
    <span class="platform-badge badge-runway">Runway Gen-4</span>
    <span class="platform-badge badge-hailuo">Hailuo</span>

  <h1>Mouvements de Caméra</h1>

<div class="count-bar">

function highlight(text) {
  const keywords = ['dolly', 'pan', 'zoom', 'tilt', 'orbit', 'aerial', 'POV', 'handheld', 'steadicam', 'camera', 'shot', 'tracking', 'cinematic'];
  let result = text;
  keywords.forEach(k => {
    result = result.replace(new RegExp(`\\b${k}\\b`, 'gi'), `<span class="keyword">${k}</span>`);
  });
  return result;
}

function renderCards(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  data.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = m.cat;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-left">
          <span class="card-icon">${m.icon}</span>
          <div>
            <div class="card-title">${m.fr}</div>
            <div class="card-en">${m.en}</div>
          </div>
        </div>
        <span class="card-num">#${m.id}</span>
      </div>
      <p class="card-desc">${m.desc}</p>
      <div class="prompt-box">
        <div class="prompt-label">Prompt</div>
        <div class="prompt-text">${highlight(m.prompt)}</div>
        <button class="copy-btn" onclick="copyPrompt(this, \`${m.prompt.replace(/`/g, "'")}\`)">COPY</button>
      </div>
      <div class="tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('count').textContent = data.length;
}

function filter(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const filtered = cat === 'all' ? movements : movements.filter(m => m.cat === cat);
  renderCards(filtered);
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'COPIED!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
  });
}

renderCards(movements);
</script>
</body>
</html>
